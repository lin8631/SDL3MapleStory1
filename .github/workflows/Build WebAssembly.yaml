name: Build WebAssembly

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  emscripten-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.70

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake make

      - name: Configure with emcmake
        run: |
          rm -rf build
          mkdir -p build/Font/@Font
          cp Engine/Font/simsun.ttc build/Font/@Font/
          cd build
          emcmake cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DZLIB_BUILD_EXAMPLES=OFF \
            -DBUILD_SHARED_LIBS=OFF

      - name: Build with emmake
        run: |
          cd build
          emmake make -j$(nproc)

      # 重命名生成的 HTML 文件为 index.html
      - name: Rename HTML to index.html
        run: mv build/sdlMS.html build/index.html

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdlMS-web
          path: |
            build/index.html
            build/sdlMS.js
            build/sdlMS.wasm
            build/sdlMS.data
          if-no-files-found: error