name: Build MacOS（静态库）

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      # 安装 vcpkg 并设置环境变量
      - name: Install vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          ./vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV

      # 安装静态依赖（强制静态链接）
      - name: Install static dependencies via vcpkg
        run: |
          export VCPKG_LIBRARY_LINKAGE=static
          $VCPKG_ROOT/vcpkg install \
            freetype:arm64-osx \
            ffmpeg:arm64-osx \
            pkgconf \
            --triplet=arm64-osx

      - name: Clean build
        run: rm -rf build

      # 配置 CMake，使用 vcpkg 工具链并指定 arm64 架构
      - name: Configure CMake
        run: |
          cmake -B build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake" \
                -DVCPKG_TARGET_TRIPLET=arm64-osx \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -S .

      - name: Build
        run: cmake --build build

      # 查找可执行文件
      - name: Find executable
        id: find_exe
        run: |
          EXE=$(find ${{ github.workspace }}/build -type f -name "sdlMS" | head -n 1)
          if [ -z "$EXE" ]; then
            echo "No executable found" >&2
            exit 1
          fi
          echo "EXE_PATH=$EXE" >> $GITHUB_ENV
          echo "Found executable at: $EXE"

      # 上传单一可执行文件
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdlMS-macos-static
          path: ${{ env.EXE_PATH }}
          if-no-files-found: error